name: Build OpenWrt (BPI-R4, 25.12, latest)

on:
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:

permissions:
  actions: write
  contents: write

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Before freeing up disk space
        run: |
          echo "Before freeing up disk space"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="
  
      - name: "Optimize Disk Space"
        uses: "hugoalh/disk-space-optimizer-ghaction@v0.8.1"
        with:
          operate_sudo: "True"
          general_include: ".+"
          general_exclude: |-
            ^GCC$
            ^G\+\+$
            Clang
            LLVM
          docker_include: ".+"
          docker_prune: "True"
          docker_clean: "True"
          apt_prune: "True"
          apt_clean: "True"
          homebrew_prune: "True"
          homebrew_clean: "True"
          npm_prune: "True"
          npm_clean: "True"
          os_swap: "True"
  
      - name: Freeing up disk space
        uses: easimon/maximize-build-space@master
        with: 
          root-reserve-mb: 3072
          swap-size-mb: 1
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
  
      - name: Free up disk space complete
        run: |
          echo "Free up disk space complete"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

    
      - name: Checkout repository
        uses: actions/checkout@main
      
      - name: Initialize the compilation environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          ( sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext \
          git libncurses-dev libssl-dev python3-distutils python3-setuptools rsync unzip zlib1g-dev swig file wget libpython3-dev aria2 jq subversion qemu-utils ccache rename libelf-dev
          sudo -E apt-get -qq purge azure-cli ghc* zulu* hhvm llvm* firefox powershell openjdk* dotnet* google* mysql* php* android* rename speedtest-cli
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean ) &
          sudo timedatectl set-timezone "$TZ"

      - name: Run builder script
        run: |
          chmod +x ./bpi-r4-openwrt-builder.sh
          ./bpi-r4-openwrt-builder.sh

      - name: List built images
        if: always()
        run: |
          ls -R openwrt/bin/targets || true

      - name: Cleanup build output
        if: success()
        run: |
          cd openwrt/bin/targets/mediatek/filogic

          rm -rf kernel-debug.tar.zst
          rm -rf packages

          for f in mt7988-ram-*.bin; do
            [ "$f" = "mt7988-ram-ddr4-bl2.bin" ] || rm -f "$f"
          done

      - name: Collect APK packages
        if: success()
        run: |
          mkdir -p openwrt/bin/apk-packages
          # 收集所有 feed 的 apk 软件包
          find openwrt/bin/packages/ -name "*.apk" -exec cp {} openwrt/bin/apk-packages/ \; 2>/dev/null || true
          # 收集 targets 下的 apk 软件包
          find openwrt/bin/targets/ -path "*/packages/*.apk" -exec cp {} openwrt/bin/apk-packages/ \; 2>/dev/null || true
          echo "Collected APK packages:"
          ls -lh openwrt/bin/apk-packages/ | head -100
          echo "Total: $(ls openwrt/bin/apk-packages/*.apk 2>/dev/null | wc -l) packages"
          cd openwrt/bin/apk-packages
          zip -r ../targets/mediatek/filogic/openwrt-bpi-r4-25.12-apk-packages.zip .

      - name: Create ZIP with all images
        if: success()
        run: |
          cd openwrt/bin/targets/mediatek/filogic
          zip -r openwrt-bpi-r4-25.12-images.zip . -x "openwrt-bpi-r4-25.12-apk-packages.zip"

      - name: Set variables
        id: vars
        run: |
          D1=$(date +'%Y.%m.%d')
          D2=$(date +'%Y-%m-%d')
          echo "date1=$D1" >> $GITHUB_ENV
          echo "date2=$D2" >> $GITHUB_ENV
          echo "release_tag=bpi-r4-25.12-mtk-$D2" >> $GITHUB_ENV

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-bpi-r4-25.12-images-${{ env.date2 }}
          path: openwrt/bin/targets/mediatek/filogic/

      - name: Create or update GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.release_tag }}
          name: BPI-R4 Firmware (${{ env.date2 }})
          body: |
            ### 编译信息
            - **编译日期**: ${{ env.date2 }}
            - **固件版本**: openwrt 25.12 with mtd sdk
            - **设备型号**: Banana Pi BPI-R4
            - **Commit**: ${{ github.sha }}

            ### 下载说明
            - `openwrt-bpi-r4-25.12-images.zip` — 固件镜像合集
            - `openwrt-bpi-r4-25.12-apk-packages.zip` — LuCI 应用及所有软件包（APK 格式）
          draft: false
          prerelease: false
          files: |
            openwrt/bin/targets/mediatek/filogic/openwrt-bpi-r4-25.12-images.zip
            openwrt/bin/targets/mediatek/filogic/openwrt-bpi-r4-25.12-apk-packages.zip
            openwrt/bin/targets/mediatek/filogic/config.buildinfo
            openwrt/bin/targets/mediatek/filogic/feeds.buildinfo
            openwrt/bin/targets/mediatek/filogic/mt7988-ram-ddr4-bl2.bin
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-emmc-bl31-uboot.fip
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-emmc-gpt.bin
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-emmc-preloader.bin
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-initramfs-kernel.bin
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-sdcard.img.gz
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-snand-bl31-uboot.fip
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-snand-preloader.bin
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-squashfs-sysupgrade.itb
            openwrt/bin/targets/mediatek/filogic/sha256sums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Delete releases and workflows runs
        uses: ophub/delete-releases-workflows@main
        with:
          delete_releases: true
          releases_keep_latest: 3
          delete_tags: true
          delete_workflows: true
          workflows_keep_day: 3
          gh_token: ${{ secrets.GITHUB_TOKEN }}
      
