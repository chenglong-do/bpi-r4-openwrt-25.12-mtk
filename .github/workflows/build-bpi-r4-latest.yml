name: Build OpenWrt (BPI-R4, 6.12, latest)

on:
  schedule:
    - cron: 0 12 * * *
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Before freeing up disk space
        run: |
          echo "Before freeing up disk space"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="
  
      - name: "Optimize Disk Space"
        uses: "hugoalh/disk-space-optimizer-ghaction@v0.8.1"
        with:
          operate_sudo: "True"
          general_include: ".+"
          general_exclude: |-
            ^GCC$
            ^G\+\+$
            Clang
            LLVM
          docker_include: ".+"
          docker_prune: "True"
          docker_clean: "True"
          apt_prune: "True"
          apt_clean: "True"
          homebrew_prune: "True"
          homebrew_clean: "True"
          npm_prune: "True"
          npm_clean: "True"
          os_swap: "True"
  
      - name: Freeing up disk space
        uses: easimon/maximize-build-space@master
        with: 
          root-reserve-mb: 3072
          swap-size-mb: 1
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
  
      - name: Free up disk space complete
        run: |
          echo "Free up disk space complete"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

    
      - name: Checkout repository
        uses: actions/checkout@v4

      # - name: Free disk space on runner
      #   run: |
      #     sudo rm -rf \
      #       "$AGENT_TOOLSDIRECTORY" \
      #       /opt/ghc \
      #       /opt/google/chrome \
      #       /opt/microsoft/msedge \
      #       /opt/microsoft/powershell \
      #       /opt/pipx \
      #       /usr/lib/mono \
      #       /usr/local/julia* \
      #       /usr/local/lib/android \
      #       /usr/local/lib/node_modules \
      #       /usr/local/share/chromium \
      #       /usr/local/share/powershell \
      #       /usr/share/dotnet \
      #       /usr/share/swift
      #     df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext libncurses-dev libssl-dev python3-distutils python3-setuptools \
            rsync swig unzip zlib1g-dev file wget libelf-dev ccache git

      # - name: Show disk space
      #   run: df -h

      - name: Run builder script
        run: |
          chmod +x ./bpi-r4-openwrt-builder.sh
          ./bpi-r4-openwrt-builder.sh

      - name: List built images
        if: always()
        run: |
          ls -R openwrt/bin/targets || true

